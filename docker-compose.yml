version: "3.9"

services:
  bot:
    build: .
    container_name: linkedin_xray_bot
    restart: unless-stopped
    env_file: .env
    volumes:
      # Persist CSV exports and logs across container restarts
      - ./data:/app/data
      - ./logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
